<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leukasumzug</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;text-align:center}
header{padding:60px;background:#020617}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;font-size:28px;font-weight:bold}
.logo img{width:50px}
.section{padding:50px 20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;max-width:1100px;margin:auto}
.card{background:#1e293b;padding:20px;border-radius:12px}
input,textarea{width:90%;padding:10px;margin:8px;border-radius:8px;border:none}
button{padding:12px 25px;background:#22c55e;border:none;border-radius:10px;font-weight:bold;cursor:pointer}
button:hover{opacity:0.8}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="https://cdn-icons-png.flaticon.com/512/1995/1995470.png">
<span>Leukasumzug</span>
</div>
<p>Günstig • Schnell • Same Day möglich</p>
</header>

<div class="section">
<h2>IKEA Transporte</h2>
<div class="card">
<form action="mailto:Leukasumzug@gmail.com" method="post" enctype="text/plain">
<input placeholder="Name" name="name"><br>
<input placeholder="Telefon" name="telefon"><br>
<input placeholder="Von Adresse" name="von"><br>
<input placeholder="Zu Adresse" name="zu"><br>
<input placeholder="Etage" name="etage"><br>
<button type="submit">Anfrage senden</button>
</form>
</div>
</div>

<div class="section">
<h2>Poco Aachen Transporte</h2>
<div class="card">
<form action="mailto:Leukasumzug@gmail.com" method="post" enctype="text/plain">
<input placeholder="Name" name="name"><br>
<input placeholder="Telefon" name="telefon"><br>
<input placeholder="Von Adresse" name="von"><br>
<input placeholder="Zu Adresse" name="zu"><br>
<input placeholder="Etage" name="etage"><br>
<button type="submit">Anfrage senden</button>
</form>
</div>
</div>

<div class="section">
<h2>Kleinanzeigen Transporte</h2>
<div class="card">
<form action="mailto:Leukasumzug@gmail.com" method="post" enctype="text/plain">
<input placeholder="Name" name="name"><br>
<input placeholder="Telefon" name="telefon"><br>
<input placeholder="Abholung Adresse" name="von"><br>
<input placeholder="Liefer Adresse" name="zu"><br>
<input placeholder="Etage" name="etage"><br>
<button type="submit">Anfrage senden</button>
</form>
</div>
</div>

<div class="section">
<h2>Kompletter Umzug</h2>
<div class="card">
<form action="mailto:Leukasumzug@gmail.com" method="post" enctype="text/plain">
<input placeholder="Name" name="name"><br>
<input placeholder="Telefon" name="telefon"><br>
<input placeholder="Alte Adresse" name="alt"><br>
<input placeholder="Neue Adresse" name="neu"><br>
<input placeholder="Etage" name="etage"><br>
<textarea placeholder="Weitere Infos"></textarea><br>
<button type="submit">Anfrage senden</button>
</form>
</div>
</div>

</body>
</html>
